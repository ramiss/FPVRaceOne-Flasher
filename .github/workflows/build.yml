name: Build

# Push a tag (v*) → builds the .exe and attaches it to a GitHub Release.
# Push/PR to main → builds the .exe and uploads it as a CI artifact for testing.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create the release on tag pushes

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller flasher.spec

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: FPVRaceOne-Flasher
          path: dist/FPVRaceOne-Flasher.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/FPVRaceOne-Flasher.exe
